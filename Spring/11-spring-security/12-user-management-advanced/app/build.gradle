plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'war'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    implementation 'org.apache.tomcat:tomcat-servlet-api:10.1.24'

    implementation platform(group: 'org.springframework.security', name: 'spring-security-bom', version: '7.0.5')
    implementation platform(group: 'org.springframework', name: 'spring-framework-bom', version: '7.0.7')
    implementation 'mysql:mysql-connector-java:8.0.33'
    
    implementation group: 'org.springframework', name: 'spring-jdbc'
    implementation group: 'org.springframework.security', name: 'spring-security-web'
    implementation group: 'org.springframework.security', name: 'spring-security-core'
    implementation group: 'org.springframework.security', name: 'spring-security-config'
    implementation group: 'org.springframework.security', name: 'spring-security-oauth2-client'
    implementation group: 'org.springframework.security', name: 'spring-security-oauth2-jose'
    implementation group: 'org.springframework', name: 'spring-context'
    implementation group: 'org.springframework', name: 'spring-core'
    implementation group: 'org.springframework', name: 'spring-webmvc'
    implementation group: 'org.apache.tomcat', name: 'tomcat-servlet-api', version: '10.1.24'
    implementation group: 'org.thymeleaf', name: 'thymeleaf-spring6', version: '3.1.2.RELEASE'
    implementation group: 'ch.qos.logback', name: 'logback-classic', version: '1.4.11'
    implementation group: 'com.fasterxml.jackson.core', name: 'jackson-databind', version: '2.18.2'

    implementation 'org.thymeleaf:thymeleaf:3.1.0.RELEASE'

    // TESTING
    
    // TestNG for testing dude
    testImplementation libs.testng
    
    // Spring tests
    testImplementation group: 'org.springframework.security', name: 'spring-security-test'
    testImplementation group: 'org.springframework', name: 'spring-test', version: '6.2.8'

    // this is to use model().attribute() method
    testImplementation("org.hamcrest:hamcrest:3.0")
    testImplementation group: 'com.h2database', name: 'h2', version: '2.3.232'
}
    

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}


tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useTestNG()
}

tasks.register('deploy', Copy) {
    dependsOn 'war'

    from war.archiveFile
    into "C:\\apache-tomcat-10.1.24-windows-x64\\webapps"
}